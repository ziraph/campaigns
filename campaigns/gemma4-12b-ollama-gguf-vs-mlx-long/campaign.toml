# gemma4:12b INSIDE OLLAMA - GGUF (Q4_K_M) vs MLX (gemma4:12b-mlx, nvfp4), LONG prompt.
#
# The sustained-decode half of the "real-world out-of-the-box" comparison. The SHORT
# campaign showed Ollama's MLX tag slower + far more CPU-hungry on a one-shot prompt - but
# short isn't MLX's regime, so this LONG run is required before any sustained claim. Watch
# whether decode converges to parity (both pinned ~91-92% of roofline on the short run) or
# MLX reclaims it.
#
# NOT matched quant or scope: GGUF gemma4:12b is Q4_K_M (~4.96 bpw, 11.9B text);
# gemma4:12b-mlx is nvfp4 (~4.5 bpw, 13.0B UNIFIED text+vision+audio). A delta blends
# engine + quant + model scope. This is the "what you get from the two official tags"
# comparison, NOT a controlled engine verdict - that's the matched-quant llama.cpp redo
# in the sibling gemma4-12b-mlx-vs-llamacpp-long campaign.
#
# Both sides: --keepalive=0 (reload each run, symmetric) + --think=false (answer-only).
# Output length is prompt-driven on both (the Ollama CLI has no num-predict flag); the long
# tutorial prompt yields a sustained-decode workload. Each long run is several minutes, so
# the full campaign is ~50 min - run on a quiet machine, external display asleep:
#   ziraph campaign remote gemma4-12b-ollama-gguf-vs-mlx-long

schema           = "ziraph-campaign/1"
name             = "gemma4-12b-ollama-gguf-vs-mlx-long"
out_dir          = "campaign-out/gemma4-12b-ollama-gguf-vs-mlx-long"
runs_per_variant = 3
schedule         = "interleaved"   # --keepalive=0 + cooldown frees between runs

[methodology]
name = "default"   # 2 untimed warmup + 3 measured runs per variant

[output]
aggregate      = true
compare        = true
compare_format = "text"

# ---- A: GGUF (Q4_K_M, ~7.6 GB) - llama.cpp engine ----
[[variant]]
label   = "ollama-gguf"
command = ["ollama", "run", "gemma4:12b", "--think=false", "--keepalive=0", "--verbose", "Write a thorough, detailed technical tutorial explaining the Transformer architecture from the ground up: tokenization, embeddings, positional encodings, the full query/key/value self-attention computation and its mathematics, multi-head attention, the feed-forward sublayers, residual connections and layer normalization, how the decoder differs from the encoder, and how the model is trained end to end. Be comprehensive and precise."]
model_name      = "gemma4:12b"
quantization    = "Q4_K_M"
runtime_version = "ollama"

# ---- B: MLX (nvfp4, ~10.0 GB) - Ollama's MLX engine ----
[[variant]]
label   = "ollama-mlx"
command = ["ollama", "run", "gemma4:12b-mlx", "--think=false", "--keepalive=0", "--verbose", "Write a thorough, detailed technical tutorial explaining the Transformer architecture from the ground up: tokenization, embeddings, positional encodings, the full query/key/value self-attention computation and its mathematics, multi-head attention, the feed-forward sublayers, residual connections and layer normalization, how the decoder differs from the encoder, and how the model is trained end to end. Be comprehensive and precise."]
model_name      = "gemma4:12b-mlx"
quantization    = "nvfp4"
runtime_version = "ollama"
